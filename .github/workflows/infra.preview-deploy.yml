name: "infra preview & deploy"

on:
  push:
    branches:
      - main
    paths:
      - 10_infra/**
      - .github/workflows/**
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.14.6"
  AWS_REGION: "ap-southeast-1"

defaults:
  run:
    shell: bash
    working-directory: "10_infra"

jobs:
  preview:
    name: "Preview"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
      - name: "Set up Terraform"
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: "Terraform format"
        run: |
          terraform fmt -check

      - name: "Show GitHub OIDC claims"
        uses: actions/github-script@v8
        with:
          script: |
            const token = await core.getIDToken('sts.amazonaws.com');

            const payload = JSON.parse(
              Buffer.from(
                token.split('.')[1],
                'base64url'
              ).toString('utf8')
            );

            core.info(`aud=${payload.aud}`);
            core.info(`sub=${payload.sub}`);
            core.info(`repository_owner_id=${payload.repository_owner_id}`);
            core.info(`repository_id=${payload.repository_id}`);
            core.info(`ref=${payload.ref}`);

      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: "Terraform init "
        run: |
          terraform init -no-color